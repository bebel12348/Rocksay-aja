<h1>Video untuk Nama-Nama</h1>
<p>Ini video untuk nama-namanya dan untuk semua yang ada di DC dan di live.</p>
<p>Ini buatan kita semua, semoga Vierstin suka dengan web ini maaf juga pake video. Terimakasih 💖💖💖💖</p>

<!-- Video autoplay, loop -->
<video autoplay loop muted>
    <source src="dc.mp4" type="video/mp4">
    Browser kamu tidak mendukung video.
</video>

<audio id="music" autoplay></audio>

<div class="music-box">
  <div id="songName">Lagu 1</div>

  <button onclick="prevSong()">⏮ Prev</button>
  <button onclick="nextSong()">⏭ Next</button>
</div>

<script>
let songs = [
  {
    name:"wind",
    src:"Akeboshi - Wind (Lyrics).mp3",
  },
  {
    name:"malu malu",
    src:"",
  },
  {
    name:"sency",
    src:"Sency - Dia, Tenxi (Lyrics).mp3",
  },
  {
    name:"公式槇原敬之もう恋なんてしない",
    src:"公式槇原敬之もう恋なんてしない(MV)5thシングル (1992年) Noriyuki MakiharaMo Koinante Shinai.mp3",
  },
  {
    name:"so asu",
    src:"So Asu - NAYKILLA ( LIRIK ).mp3",
  }
];

let index = 0;
let player = document.getElementById("music");
let songName = document.getElementById("songName");

function loadSong(){
  player.src = songs[index].src;
  songName.innerText = songs[index].name;
  player.play();
}

loadSong();

function nextSong(){
  index++;
  if(index >= songs.length){
    index = 0;
  }
  loadSong();
}

function prevSong(){
  index--;
  if(index < 0){
    index = songs.length - 1;
  }
  loadSong();
}

player.addEventListener("ended", function(){
  nextSong();
});
</script>

<style>
