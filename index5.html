<h1>Video untuk Nama-Nama</h1>
<p>Ini video untuk nama-namanya dan untuk semua yang ada di DC dan di live.</p>
<p>Ini buatan kita semua, semoga Vierstin suka dengan web ini maaf juga pake video. Terimakasih 💖💖💖💖</p>

<!-- Video autoplay, loop -->
<video autoplay loop muted>
    <source src="dc.mp4" type="video/mp4">
    Browser kamu tidak mendukung video.
</video>

<audio id="music" autoplay></audio>

<div class="music-control">
  <button onclick="prevSong()">⏮previous music</button>
  <button onclick="nextSong()">⏭next music</button>
</div>

<script>
let songs = [
  "Akeboshi - Wind (Lyrics).mp3",
  "公式槇原敬之もう恋なんてしない(MV)5thシングル (1992年) Noriyuki MakiharaMo Koinante Shinai.mp3"
];

let index = 0;
let player = document.getElementById("music");

player.src = songs[index];
player.play();

function nextSong(){
  index++;
  if(index >= songs.length){
    index = 0;
  }
  player.src = songs[index];
  player.play();
}

function prevSong(){
  index--;
  if(index < 0){
    index = songs.length - 1;
  }
  player.src = songs[index];
  player.play();
}

player.addEventListener("ended", function(){
  nextSong();
});
</script>

<style>
.music-control{
  position: fixed;
  top: 10px;
  right: 10px;
}

.music-control button{
  padding: 6px 10px;
  margin: 2px;
  background: pink;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
